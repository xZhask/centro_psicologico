<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Centro Psicológico</title>
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <h2>🧠 Centro Psicológico</h2>
        <p class="login-subtitle">Iniciar Sesión</p>
        <input id="dni" placeholder="DNI" autocomplete="username">
        <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password">
        <button id="btnLogin" onclick="login()">Ingresar</button>
        <div id="error" class="error"></div>
        <div id="loading" class="loading hidden">Cargando...</div>
    </div>
</div>

<script src="assets/js/auth.js"></script>
</body>
</html>
